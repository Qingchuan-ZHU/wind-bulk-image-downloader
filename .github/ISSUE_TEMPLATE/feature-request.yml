name: Feature request
description: 提出功能建议 / Suggest an improvement
title: '[Feature] '
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        欢迎提出改进建议。请尽量说明使用场景与价值。
        Please describe the use case and the value of the proposed change.
  - type: textarea
    id: problem
    attributes:
      label: 当前问题 / Problem
      description: 您想解决什么问题？What problem are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案 / Proposal
      description: 您希望新增或改成什么？What would you like to change?
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: 边界与注意事项 / Scope and notes
      description: 是否涉及权限、隐私、兼容性或非目标功能？
